changelog:
  categories:
    - title: "🆕 New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔧 Maintenance"
      labels:
        - refactor
        - chore
        - documentation
        - test
    - title: "🔄 Other Changes"
      labels:
        - "*"
